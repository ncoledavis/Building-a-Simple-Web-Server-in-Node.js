<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1" />

    body { margin: 2rem; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; }

    p  { margin-top: 0.25rem; color: #475569; }
    a  { color: #2563eb; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .muted { color: #94a3b8; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    .actions { margin-top: 1rem; display: flex; gap: 0.75rem; }
    button { padding: 0.5rem 0.75rem; border: 1px solid #cbd5e1; border-radius: 0.375rem; background: transparent; cursor: pointer; }
    button:hover { background: #f1f5f9; }
  </style>
</head>

  <p class="muted">The resource you requested could not be found.</p>
